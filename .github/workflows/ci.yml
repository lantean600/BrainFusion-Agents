name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: |
          export PYTHONPATH=src
          python -m unittest discover -s tests

      - name: Audit dataset registry
        run: |
          export PYTHONPATH=src
          python -m brainfusion_agents audit-registry

      - name: Run cloud dry-run smoke test
        run: |
          export PYTHONPATH=src
          python -m brainfusion_agents cloud-run --output-dir test-output/ci-cloud-run
          test -f test-output/ci-cloud-run/manifest.json
          test -f test-output/ci-cloud-run/project_status.json
          python -m brainfusion_agents validate-project-package --package-dir test-output/ci-cloud-run

      - name: Run preprocessing and fusion pipeline smoke test
        run: |
          export PYTHONPATH=src
          python -m brainfusion_agents run-pipeline --output-dir test-output/ci-pipeline
          test -f test-output/ci-pipeline/manifest.json
          test -f test-output/ci-pipeline/pipeline_report.json
          test -f test-output/ci-pipeline/artifacts/pet-mr-fusion/pet_mr_fusion_planning.json

      - name: Run synthetic runtime demo smoke test
        run: |
          export PYTHONPATH=src
          python -m brainfusion_agents synthetic-demo --output-dir test-output/ci-synthetic-demo
          test -f test-output/ci-synthetic-demo/demo_summary.json
          test -f test-output/ci-synthetic-demo/pet_mr_fusion_demo.json
          test -f test-output/ci-synthetic-demo/ct_preprocessing_demo.json
          test -f test-output/ci-synthetic-demo/wsi_preprocessing_demo.json

      - name: Materialize tumor download plan without network
        run: |
          export PYTHONPATH=src
          python -m brainfusion_agents download-data --output-dir test-output/ci-download-plan --dataset-ids medmnist-breastmnist
          test -f test-output/ci-download-plan/download_manifest.json
          test -f test-output/ci-download-plan/download_summary.json

      - name: Run full cloud job smoke test
        run: |
          export PYTHONPATH=src
          python -m brainfusion_agents cloud-job --output-dir test-output/ci-cloud-job --download-policy off
          test -f test-output/ci-cloud-job/job_summary.json
          test -f test-output/ci-cloud-job/project-dry-run/manifest.json
          test -f test-output/ci-cloud-job/pipeline-run/pipeline_report.json
          test -f test-output/ci-cloud-job/synthetic-runtime/demo_summary.json
          python -m brainfusion_agents validate-project-package --package-dir test-output/ci-cloud-job/project-dry-run

      - name: Enforce no-download metadata boundary
        run: |
          python - <<'PY'
          from pathlib import Path

          forbidden = (
              "local_path",
              "download_path",
              '"access_status": "downloaded"',
          )
          paths = [
              Path("data/dataset_registry.json"),
              Path("data/tumor_download_plan.json"),
              Path("src/brainfusion_agents/data/dataset_registry.json"),
              Path("src/brainfusion_agents/data/tumor_download_plan.json"),
          ]
          for path in paths:
              text = path.read_text(encoding="utf-8")
              matches = [term for term in forbidden if term in text]
              if matches:
                  raise SystemExit(f"{path} contains forbidden metadata fields: {matches}")
          PY
